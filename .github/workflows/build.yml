name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4

      - run: ./gradlew buildPlugin

      - uses: actions/upload-artifact@v4
        with:
          name: plugin-zip
          path: build/distributions/*.zip
