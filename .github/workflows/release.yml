name: Release

on:
  push:
    tags: ['v*']

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git tag --sort=-v:refname | head -2 | tail -1)
          if [ -z "$PREV_TAG" ] || [ "$PREV_TAG" = "${{ github.ref_name }}" ]; then
            NOTES=$(git log --format="- %s" HEAD)
          else
            NOTES=$(git log --format="- %s" "${PREV_TAG}..HEAD")
          fi
          # Convert to HTML for plugin.xml
          HTML="<p>${{ github.ref_name }}</p><ul>"
          while IFS= read -r line; do
            item="${line#- }"
            HTML="${HTML}<li>${item}</li>"
          done <<< "$NOTES"
          HTML="${HTML}</ul>"
          echo "html=$HTML" >> "$GITHUB_OUTPUT"

      - run: ./gradlew buildPlugin
        env:
          CHANGELOG: ${{ steps.changelog.outputs.html }}

      - name: Publish to JetBrains Marketplace
        run: ./gradlew publishPlugin
        env:
          PUBLISH_TOKEN: ${{ secrets.PUBLISH_TOKEN }}
          CHANGELOG: ${{ steps.changelog.outputs.html }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/distributions/*.zip
          generate_release_notes: true
